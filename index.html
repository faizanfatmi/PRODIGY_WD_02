<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Stopwatch — Apple Style</title>
    <meta name="description"
        content="A premium stopwatch web application with liquid water effects inspired by Apple design." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Pro+Display&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Liquid water background -->
    <div class="liquid-bg">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
        <div class="bubble bubble-6"></div>
        <div class="bubble bubble-7"></div>
        <div class="bubble bubble-8"></div>
    </div>

    <!-- Wave layers -->
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs>
            <path id="wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="wave-parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.04)" />
            <use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.03)" />
            <use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.02)" />
            <use href="#wave" x="48" y="7" fill="rgba(255,255,255,0.015)" />
        </g>
    </svg>

    <div class="app-container">
        <!-- Stopwatch Card -->
        <div class="stopwatch-card">
            <!-- Liquid ring around timer -->
            <div class="timer-ring-container">
                <svg class="timer-ring" viewBox="0 0 260 260">
                    <defs>
                        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
                            <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.35" />
                            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.15" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                            <feMerge>
                                <feMergeNode in="coloredBlur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <circle class="ring-bg" cx="130" cy="130" r="120" />
                    <circle class="ring-progress" cx="130" cy="130" r="120" id="progressRing" />
                    <circle class="ring-dot" cx="130" cy="10" r="6" id="progressDot" />
                </svg>

                <!-- Water fill inside ring -->
                <div class="water-fill-container" id="waterFill">
                    <div class="water-fill">
                        <div class="water-wave water-wave-1"></div>
                        <div class="water-wave water-wave-2"></div>
                    </div>
                </div>

                <!-- Timer Display -->
                <div class="timer-display">
                    <span class="time-segment" id="minutes">00</span>
                    <span class="time-colon">:</span>
                    <span class="time-segment" id="seconds">00</span>
                    <span class="time-dot">.</span>
                    <span class="time-ms" id="milliseconds">00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-reset" id="resetBtn" title="Reset">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 12a8 8 0 0 1 14.93-4" />
                        <path d="M20 12a8 8 0 0 1-14.93 4" />
                        <polyline points="4 8 4 12 8 12" />
                        <polyline points="20 16 20 12 16 12" />
                    </svg>
                </button>
                <button class="btn btn-start" id="startBtn" title="Start">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="6,3 20,12 6,21" />
                    </svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <rect x="5" y="3" width="4" height="18" rx="1" />
                        <rect x="15" y="3" width="4" height="18" rx="1" />
                    </svg>
                </button>
                <button class="btn btn-lap" id="lapBtn" title="Lap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <line x1="4" y1="22" x2="4" y2="15" stroke-linecap="round" />
                    </svg>
                </button>
            </div>

            <!-- Laps List -->
            <div class="laps-container" id="lapsContainer">
                <div class="laps-header">
                    <span>Lap</span>
                    <span>Lap Time</span>
                    <span>Total</span>
                </div>
                <ul class="laps-list" id="lapsList"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
